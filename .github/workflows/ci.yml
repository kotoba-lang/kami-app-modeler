name: ci
on: [push, pull_request]
jobs:
  clojure-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kami-app-modeler
    steps:
      - uses: actions/checkout@v4
        with: {path: kami-app-modeler}
      - uses: ./kami-app-modeler/.github/actions/checkout-workspace
      - uses: DeLaGuardo/setup-clojure@13.2
        with:
          cli: latest
      - run: clojure -M:lint
      - run: clojure -M:test
  build-browser-bundle:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kami-app-modeler
    steps:
      - uses: actions/checkout@v4
        with: {path: kami-app-modeler}
      - uses: ./kami-app-modeler/.github/actions/checkout-workspace
      - uses: actions/setup-node@v4
        with: {node-version: 22, cache: npm, cache-dependency-path: kami-app-modeler/package-lock.json}
      - uses: DeLaGuardo/setup-clojure@13.2
        with:
          cli: latest
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: modeler-browser-bundle
          path: kami-app-modeler/public/js/app.js
  webgl2-e2e:
    needs: build-browser-bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: {name: modeler-browser-bundle, path: public/js}
      - uses: actions/setup-node@v4
        with: {node-version: 22, cache: npm}
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run verify:webgl2
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: modeler-webgl2
          path: test/modeler-webgl2.png
          if-no-files-found: ignore
  browser-compatibility:
    needs: build-browser-bundle
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: {browser: [chromium, firefox, webkit]}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: {name: modeler-browser-bundle, path: public/js}
      - uses: actions/setup-node@v4
        with: {node-version: 22, cache: npm}
      - run: npm ci
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - run: npm run verify:compat
        env:
          BROWSER: ${{ matrix.browser }}
  webgpu-e2e:
    needs: build-browser-bundle
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: {name: modeler-browser-bundle, path: public/js}
      - uses: actions/setup-node@v4
        with: {node-version: 22, cache: npm}
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm run verify:webgpu
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: modeler-webgpu
          path: test/modeler-webgpu.png
          if-no-files-found: ignore
