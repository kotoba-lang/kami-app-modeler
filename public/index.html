<!DOCTYPE html>
<html lang="en">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" href="data:,"><title>Kami Modeler</title><style>aside:last-child { border-left: 1px solid #293456; border-right: 0; }
header span,.hint { color: #9ca9c9; font-size: 12px; }
.gpu-fallback { position: absolute; inset: 45% auto auto 50%; transform: translate(-50%,-50%); color: #ffb9b9; }
* { box-sizing: border-box; }
.primary { background: #6f8fff; color: #071127; border: 0; font-weight: 700; }
.viewport { position: relative; overflow: hidden; background: radial-gradient(circle at 50% 42%,#1e315a,#0a0f1e 62%); }
body { margin: 0; height: 100vh; display: grid; grid-template-rows: 54px 1fr; font-family: Inter,ui-sans-serif,system-ui; background: #0b1020; color: #e8ecf8; }
.modifier-row { display: grid; grid-template-columns: 1fr 30px 30px 30px; gap: 4px; align-items: center; font-size: 11px; }
header strong { color: #9eb8ff; letter-spacing: .04em; }
label { display: grid; gap: 8px; color: #bfcbe8; }
h2 { margin: 8px 0 3px; font-size: 11px; text-transform: uppercase; letter-spacing: .12em; color: #91a1ca; }
header button { margin-left: auto; }
main { display: grid; grid-template-columns: 230px 1fr 260px; min-height: 0; }
.status { right: 18px; bottom: 16px; display: flex; gap: 14px; background: #0b1020bb; padding: 8px; border-radius: 6px; }
.modifier-row button { padding: 5px; text-align: center; }
.axis { bottom: 24px; left: 26px; color: #ffadb7; }
#gpu-canvas { width: 100%; height: 100%; display: block; }
button:hover,.selected { border-color: #7d9cff; background: #293a70; }
.axis,.status { position: absolute; font-family: ui-monospace; font-size: 12px; color: #b8caff; }
aside { padding: 18px; background: #101733; display: flex; flex-direction: column; gap: 9px; border-right: 1px solid #293456; }
input,select { accent-color: #8aa8ff; background: #171f3b; color: #e8ecf8; border: 1px solid #35446e; padding: 8px; }
header { display: flex; align-items: center; gap: 20px; padding: 0 18px; background: #111936; border-bottom: 1px solid #293456; }
button { border: 1px solid #35446e; border-radius: 7px; background: #171f3b; color: #e8ecf8; padding: 9px 10px; text-align: left; cursor: pointer; }</style></head>
  <body>
    <header><strong>KAMI MODELER</strong><a href="https://kotoba-lang.github.io/kami-studio/">Studio</a><span>WebGPU polygon workspace</span><span id="project-status">clean · r0</span><button id="new-cube">New Cube</button><button id="save-project">Save</button><button id="load-project">Load</button><button id="import">Import Project</button><input id="import-file" type="file" accept=".edn,.kami-modeler.edn" style="display:none;"><button id="export">Export Project</button></header>
    <main>
      <aside>
        <h2>Scene</h2>
        <button class="primary" id="mode-toggle">Edit Mode</button>
        <div id="scene-tree"></div>
        <button id="duplicate-object">Duplicate object</button>
        <button id="delete-object">Delete object</button>
        <h2>Edit tools</h2>
        <button class="selected" data-command="select">Select Face</button>
        <button id="inset">Inset</button>
        <button id="scale">Scale Face</button>
        <button id="move">Move Face</button>
        <button id="delete-face">Delete Face</button>
        <h2>Interaction profile</h2>
        <select id="profile">
          <option value="blender">Blender</option>
          <option value="maya">Maya</option>
          <option value="max">3ds Max</option>
          <option value="c4d">Cinema 4D</option>
        </select>
        <p class="hint" id="shortcutHint">Click Select · E Extrude · MMB Orbit · Ctrl+Z Undo</p>
      </aside>
      <section class="viewport">
        <canvas id="gpu-canvas" aria-label="WebGPU mesh viewport"></canvas>
        <div class="gpu-fallback" id="gpu-status">Initializing WebGPU…</div>
        <div class="axis">Y
│
└── X</div>
        <div class="status">
          <span id="tool">Select Face</span>
          <span id="meshStats">8 vertices · 6 faces</span>
        </div>
      </section>
      <aside>
        <h2>Object Inspector</h2>
        <label>Name<input id="object-name"></label>
        <label>Location X<input id="tx" type="number" step="0.1"></label>
        <label>Location Y<input id="ty" type="number" step="0.1"></label>
        <label>Location Z<input id="tz" type="number" step="0.1"></label>
        <button id="apply-transform">Apply object transform</button>
        <h2>Modifiers</h2>
        <button id="add-mirror">＋ Mirror X</button>
        <button id="add-subdivision">＋ Subdivision</button>
        <button id="add-array">＋ Array</button>
        <div id="modifier-stack"></div>
        <h2>Face Inspector</h2>
        <p id="selection">Face 1 selected</p>
        <label>Operation amount <output id="distanceValue">0.50</output><input id="distance" type="range" min="0.05" max="2" step="0.05" value="0.5"></label>
        <button class="primary" id="extrude">Extrude selected face</button>
        <button id="undo">Undo</button>
        <button id="redo">Redo</button>
      </aside>
    </main>
    <span id="debug-state" style="display:none;"></span>
    <script src="./js/app.js"></script>
  </body>
</html>
