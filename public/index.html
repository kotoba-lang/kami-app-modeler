<!DOCTYPE html>
<html lang="en">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kami Modeler</title><style>[:hiccup/raw "aside:last-child { border-left: 1px solid #293456; border-right: 0; }\nheader span,.hint { color: #9ca9c9; font-size: 12px; }\n.grid { position: absolute; inset: 45% -30% -45%; background: linear-gradient(#35507b 1px,transparent 1px),linear-gradient(90deg,#35507b 1px,transparent 1px); background-size: 34px 34px; transform: perspective(380px) rotateX(62deg); opacity: .6; }\n* { box-sizing: border-box; }\n.primary { background: #6f8fff; color: #071127; border: 0; font-weight: 700; }\n.viewport { position: relative; overflow: hidden; background: radial-gradient(circle at 50% 42%,#1e315a,#0a0f1e 62%); }\nbody { margin: 0; height: 100vh; display: grid; grid-template-rows: 54px 1fr; font-family: Inter,ui-sans-serif,system-ui; background: #0b1020; color: #e8ecf8; }\nheader strong { color: #9eb8ff; letter-spacing: .04em; }\nlabel { display: grid; gap: 8px; color: #bfcbe8; }\n#cube { box-shadow: inset -18px -16px #3655a8,0 26px 48px #0008; transform: translate(-50%,-50%) skewY(-30deg) scaleY(.86); transition: height .2s; top: 42%; width: 150px; background: #6292ff; position: absolute; height: 150px; left: 50%; }\nh2 { margin: 8px 0 3px; font-size: 11px; text-transform: uppercase; letter-spacing: .12em; color: #91a1ca; }\nheader button { margin-left: auto; }\nmain { display: grid; grid-template-columns: 230px 1fr 260px; min-height: 0; }\n.status { right: 18px; bottom: 16px; display: flex; gap: 14px; background: #0b1020bb; padding: 8px; border-radius: 6px; }\n.axis { bottom: 24px; left: 26px; color: #ffadb7; }\ninput { accent-color: #8aa8ff; }\nbutton:hover,.selected { border-color: #7d9cff; background: #293a70; }\n.axis,.status { position: absolute; font-family: ui-monospace; font-size: 12px; color: #b8caff; }\naside { padding: 18px; background: #101733; display: flex; flex-direction: column; gap: 9px; border-right: 1px solid #293456; }\nheader { display: flex; align-items: center; gap: 20px; padding: 0 18px; background: #111936; border-bottom: 1px solid #293456; }\nbutton { border: 1px solid #35446e; border-radius: 7px; background: #171f3b; color: #e8ecf8; padding: 9px 10px; text-align: left; cursor: pointer; }"]</style></head>
  <body>
    <header>
      <strong>KAMI MODELER</strong>
      <span>Polygon authoring preview</span>
      <button id="export">Export project</button>
    </header>
    <main>
      <aside>
        <h2>Scene</h2>
        <button class="object selected">◆ Cube</button>
        <h2>Tools</h2>
        <button data-tool="select">Select</button>
        <button data-tool="extrude">Extrude</button>
        <button data-tool="move">Move</button>
        <p class="hint">Choose Extrude, then use the control on the right.</p>
      </aside>
      <section class="viewport">
        <div class="grid"></div>
        <div id="cube" aria-label="Selected cube"></div>
        <div class="axis">Y
│
└── X</div>
        <div class="status">
          <span id="tool">Select</span>
          <span id="faces">6 faces</span>
        </div>
      </section>
      <aside>
        <h2>Inspector</h2>
        <label>Extrude distance <output id="distanceValue">0.50</output><input id="distance" type="range" min="0.1" max="2" step="0.1" value="0.5"></label>
        <button class="primary" id="extrude">Extrude selected face</button>
        <h2>History</h2>
        <ol id="history">
          <li>Create cube</li>
        </ol>
        <button id="undo">Undo</button>
      </aside>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
